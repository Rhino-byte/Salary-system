[pytest]
# Pytest configuration for Salary Management System

# Test discovery patterns
# Only collect test files from tests/ directory if it exists
# Exclude scripts/ directory since those are utility scripts, not tests
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Exclude directories and files from test collection
# Important: scripts/ contains utility scripts that should not be collected as tests
norecursedirs = .git .venv venv env __pycache__ scripts .pytest_cache node_modules api static templates docs vector_store

# Ignore patterns (additional exclusion)
# This ensures scripts/ directory is never collected, even if testpaths is empty
# Note: If tests/ doesn't exist, pytest will search current directory, so we need this
ignore = scripts

# Test output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --ignore=scripts

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
